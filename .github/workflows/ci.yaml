name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build CI image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: ci
          load: true
          tags: feedway-ci:latest
          cache-from: type=gha,scope=ci
          cache-to: type=gha,mode=max,scope=ci

      - name: Run tests and static checks
        run: just ci-checks no

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            # full length sha
            type=sha,format=long,prefix=
          flavor: |
            latest=true

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push production image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          # Pull requests validate the image; only pushes to main publish it.
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha,scope=production
            type=gha,scope=ci
          cache-to: type=gha,mode=max,scope=production
