services:
  feedway:
    build:
      context: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      API_TOKEN: ${API_TOKEN:?API_TOKEN is required}
      DB_HOST: ${DB_HOST:-postgres}
      DB_NAME: ${DB_NAME:-feedway}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-feedway}
      RETENTION_DAYS: ${RETENTION_DAYS:-60}
    ports:
      - "8080:80"
    read_only: true
    restart: unless-stopped
    stop_grace_period: 20s
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  postgres:
    image: postgres:18.4-trixie@sha256:c2d42a104eb6b37b286a2d9c5cf83f349de4d6516d513d00a2bd9610e2c2e5e4
    command: ["postgres", "-p", "${DB_PORT:-5432}"]
    environment:
      POSTGRES_DB: ${DB_NAME:-feedway}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_PORT: ${DB_PORT:-5432}
      POSTGRES_USER: ${DB_USER:-feedway}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\" -p \"$$POSTGRES_PORT\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
      start_interval: 1s
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql
    security_opt:
      - no-new-privileges:true

volumes:
  postgres-data:
