services:
  markdownlint:
    image: davidanson/markdownlint-cli2:v0.23.1@sha256:f382ea4fdc949883e79de678009437fb40c339323654c7b0dd4d5221cda8ed20
    working_dir: /workdir
    volumes:
      - .:/workdir
    read_only: true
    network_mode: none
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  postgres:
    image: postgres:18.4-trixie@sha256:c2d42a104eb6b37b286a2d9c5cf83f349de4d6516d513d00a2bd9610e2c2e5e4
    environment:
      POSTGRES_DB: feedway_test
      POSTGRES_PASSWORD: feedway_test
      POSTGRES_USER: feedway
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U feedway -d feedway_test"]
      interval: 1s
      timeout: 5s
      retries: 30
    tmpfs:
      - /var/lib/postgresql

  test:
    image: feedway-ci:latest
    build:
      context: .
      target: ci
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_NAME: feedway_test
      DB_PASSWORD: feedway_test
      DB_PORT: 5432
      DB_USER: feedway
      GOCACHE: /tmp/go-build
      GOLANGCI_LINT_CACHE: /tmp/golangci-lint
    read_only: true
    tmpfs:
      - /tmp:exec,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
